<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Red rounded square background -->
  <rect x="10" y="20" width="80" height="80" rx="15" fill="#FF3B30"/>

  <!-- Heart with rays -->
  <g transform="translate(50, 60)">
    <!-- Heart shape -->
    <path d="M0,-5 C-8,-15 -18,-15 -18,-5 C-18,5 0,20 0,20 C0,20 18,5 18,-5 C18,-15 8,-15 0,-5 Z" fill="white"/>

    <!-- Rays around heart -->
    <line x1="0" y1="-20" x2="0" y2="-28" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="-14" x2="19" y2="-21" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="0" x2="28" y2="0" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="14" x2="19" y2="21" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Text: Phoenix Children's -->
  <text x="110" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#333333">Phoenix</text>
  <text x="110" y="95" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#333333">Children's</text>
</svg>